<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elige tu perfil - Tutorías</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        .options {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .option {
            flex: 1;
            min-width: 150px;
            padding: 30px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .option.padres:hover {
            border-color: #667eea;
            background: #f0f3ff;
        }
        .option.profesores:hover {
            border-color: #764ba2;
            background: #f5f0ff;
        }
        .option i {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }
        .option.padres i {
            color: #667eea;
        }
        .option.profesores i {
            color: #764ba2;
        }
        .option h3 {
            margin: 0;
            color: #333;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-calendar-alt" style="color: #667eea;"></i> Sistema de Tutorías</h1>
        <p>¿Cómo quieres acceder?</p>
        
        <div class="options">
            <div class="option padres" onclick="window.location.href='/padres'">
                <i class="fas fa-users"></i>
                <h3>Padres/Madres</h3>
                <small style="color: #666;">Reservar tutoría</small>
            </div>
            
            <div class="option profesores" onclick="window.location.href='/login'">
                <i class="fas fa-chalkboard-teacher"></i>
                <h3>Profesores</h3>
                <small style="color: #666;">Iniciar sesión</small>
            </div>
        </div>
        
        <p style="margin-top: 30px; color: #999; font-size: 0.8rem;">
            <i class="fas fa-shield-alt"></i> Cumple RGPD
        </p>
    </div>
</body>
</html>
